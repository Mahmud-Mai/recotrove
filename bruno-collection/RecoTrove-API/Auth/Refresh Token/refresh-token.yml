info:
  name: Refresh Token
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/refresh?refresh_token={{refresh_token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("access_token", res.body.access_token);
          bru.setVar("refresh_token", res.body.refresh_token);
        }
