info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/auth/login"
  body:
    type: form-urlencoded
    data:
      - name: username
        value: admin@recotrove.com
      - name: password
        value: Admin123ChangeMe!

runtime:
  variables:
    - name: base_url
      value: http://127.0.0.1:8030
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("access_token", res.body.access_token);
          bru.setVar("refresh_token", res.body.refresh_token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
