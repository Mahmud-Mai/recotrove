info:
  name: Create Resource
  type: http
  seq: 3

http:
  method: POST
  url: "{{base_url}}/api/v1/resources"
  headers:
    - name: Content-Type
      value: application/json
  auth:
    type: bearer
    token: "{{access_token}}"
  body:
    type: json
    data: |-
      {
        "title": "Python Crash Course",
        "description": "A hands-on introduction to Python programming",
        "category_id": "{{category_id}}"
      }
