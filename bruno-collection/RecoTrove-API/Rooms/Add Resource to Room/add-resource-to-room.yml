info:
  name: Add Resource to Room
  type: http
  seq: 8

http:
  method: POST
  url: "{{base_url}}/api/v1/rooms/{{room_id}}/resources"
  headers:
    - name: Content-Type
      value: application/json
  auth:
    type: bearer
    token: "{{access_token}}"
  body:
    type: json
    data: |-
      {
        "resource_id": "{{resource_id}}"
      }
