info:
  name: Create Room
  type: http
  seq: 2

http:
  method: POST
  url: "{{base_url}}/api/v1/rooms"
  headers:
    - name: Content-Type
      value: application/json
  auth:
    type: bearer
    token: "{{access_token}}"
  body:
    type: json
    data: |-
      {
        "name": "Python Study Group",
        "description": "A room for sharing Python learning resources"
      }
