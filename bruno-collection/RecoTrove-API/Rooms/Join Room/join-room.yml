info:
  name: Join Room
  type: http
  seq: 6

http:
  method: POST
  url: "{{base_url}}/api/v1/rooms/{{room_id}}/join"
  headers:
    - name: Content-Type
      value: application/json
  auth:
    type: bearer
    token: "{{access_token}}"
  body:
    type: json
    data: |-
      {
        "invite_code": "{{invite_code}}"
      }
